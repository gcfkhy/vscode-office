<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#262638"/>
      <stop offset="1" stop-color="#13131d"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.15" r="0.85">
      <stop stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#f38ba8"/>
      <stop offset="0.2" stop-color="#fab387"/>
      <stop offset="0.4" stop-color="#f9e2af"/>
      <stop offset="0.6" stop-color="#a6e3a1"/>
      <stop offset="0.8" stop-color="#89b4fa"/>
      <stop offset="1" stop-color="#cba6f7"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#c7d0f5"/>
      <stop offset="1" stop-color="#b4befe"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b0b12" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- 底板:Catppuccin Mocha 深色圆角方块 -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#board)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#sheen)"/>
  <rect x="17" y="17" width="478" height="478" rx="111" fill="none" stroke="#45475a" stroke-opacity="0.55" stroke-width="2"/>

  <!-- 多彩主题条(暗示 18 套主题) -->
  <rect x="132" y="116" width="248" height="24" rx="12" fill="url(#rainbow)" filter="url(#ds)"/>

  <!-- Markdown M↓ 徽标(官方 mark) -->
  <g filter="url(#ds)" transform="translate(106,206) scale(1.4423)">
    <rect x="5" y="5" width="198" height="118" rx="14" fill="none" stroke="url(#mark)" stroke-width="9"/>
    <path d="M30 98V30h20l20 25 20-25h20v68H110V59L90 84 70 59v39zm125 0l-30-33h20V30h20v35h20z" fill="url(#mark)"/>
  </g>
</svg>
